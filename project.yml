name: Carddex
options:
  bundleIdPrefix: com.carddex
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Carddex:
    type: application
    platform: iOS
    sources:
      - path: Carddex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carddex.app
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_NSCameraUsageDescription: "Carddex uses the camera to scan and identify your trading cards."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  CarddexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarddexTests
    dependencies:
      - target: Carddex
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.carddex.app.tests
schemes:
  Carddex:
    build:
      targets:
        Carddex: all
        CarddexTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CarddexTests
