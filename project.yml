name: Carddex
options:
  bundleIdPrefix: com.carddex
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Carddex:
    type: application
    platform: iOS
    sources:
      - path: Carddex
    info:
      path: Carddex/Info.plist
      properties:
        CFBundleDisplayName: "The Case"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "Carddex uses the camera to scan and identify your trading cards."
        # Dev only: allow http to the local Supabase stack (127.0.0.1) in the simulator.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carddex.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Carddex/Carddex.entitlements
    dependencies:
      - target: CarddexWidgets
  CarddexWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CarddexWidgets
      - path: Carddex/DesignSystem/Theme.swift
      - path: Carddex/DesignSystem/Color+Hex.swift
      - path: Carddex/Store/WidgetShared.swift
    info:
      path: CarddexWidgets/Info.plist
      properties:
        CFBundleDisplayName: "The Case"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carddex.app.widgets
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: CarddexWidgets/CarddexWidgets.entitlements
        SKIP_INSTALL: YES
  CarddexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarddexTests
    dependencies:
      - target: Carddex
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.carddex.app.tests
schemes:
  Carddex:
    build:
      targets:
        Carddex: all
        CarddexTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CarddexTests
