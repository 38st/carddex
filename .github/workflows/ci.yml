name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: macos-15
    env:
      SCHEME: Carddex
      PROJECT: Carddex.xcodeproj
      DERIVED: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app/Contents/Developer 2>/dev/null | head -1)"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED" \
            -configuration Debug \
            build 2>&1 | tee build.log

      - name: Resolve a test simulator
        id: sim
        run: |
          # Pick the first available iOS Simulator device; prefer iPhone 16.
          SIM="$(xcrun simctl list devices available -j | python3 -c '
          import json,sys
          data=json.load(sys.stdin)
          for runtime,devices in data["devices"].items():
              if "iOS" in runtime:
                  for d in devices:
                      if d["isAvailable"] and d["name"].startswith("iPhone 16"):
                          print(d["udid"]); sys.exit(0)
          for runtime,devices in data["devices"].items():
              if "iOS" in runtime:
                  for d in devices:
                      if d["isAvailable"] and d["name"].startswith("iPhone"):
                          print(d["udid"]); sys.exit(0)
          ' || true)"
          if [ -z "$SIM" ]; then echo "No iOS simulator found" >&2; exit 1; fi
          echo "udid=$SIM" >> "$GITHUB_OUTPUT"
          echo "Found simulator UDID: $SIM"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$DERIVED" \
            -configuration Debug \
            test 2>&1 | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore
